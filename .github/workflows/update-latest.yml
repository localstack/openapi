name: Update OpenAPI specs to latest
on:
  repository_dispatch:
    types: [openapi-update]
  workflow_dispatch:

jobs:
  update-to-latest:
    name: "Update specs to latest"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout OpenAPI
        uses: actions/checkout@v4

      - name: Generate spec
        uses: ./.github/actions/generate-spec
        with:
          pro-ref: ${{ github.event.client_payload.ref }}
          pro-token: ${{ secrets.PRO_GITHUB_TOKEN }}
          fallback-to-main: "true"
          latest: "true"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Update latest OpenAPI spec"
          body: "This PR updates the latest version of the LocalStack's OpenAPI spec."
          branch: "update-latest"
          author: "LocalStack Bot <localstack-bot@users.noreply.github.com>"
          committer: "LocalStack Bot <localstack-bot@users.noreply.github.com>"
          commit-message: "Update latest OpenAPI spec"
          token: ${{ secrets.GITHUB_TOKEN }}
          reviewers: giograno
          add-paths: |
            openapi/*.yml
